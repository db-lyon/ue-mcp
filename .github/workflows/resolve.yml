name: Resolve Issue

on:
  issues:
    types: [labeled]

jobs:
  resolve:
    if: github.event.label.name == 'resolve'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci && npx tsc

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "ue-mcp-bot"
          git config user.email "ue-mcp-bot@users.noreply.github.com"

      - name: Resolve issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node dist/index.js resolve ${{ github.event.issue.number }} --ci

      - name: Remove resolve label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ github.event.issue.number }} --remove-label resolve
